<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="billing">
    <h2>Payment Details</h2>

    <div id="cartItems"></div>

    

   <div class="qr-section">
     <h3>Total Amount: <span id="totalAmount">Rs.0</span></h3>
    <h3>Scan QR to Pay</h3>
    <img src="images/img/QR.jpg" alt="QR Code">
</div>

    <div class="input-box">
        <label>Name</label>
         <input type="text" id="payerName" placeholder="Your Name">
    </div>

    <div class="input-box">
        <label>UPI ID</label>
         

<input type="text" id="payerUpi" placeholder="yourupi@bank">

    </div>

 <button class="btn" onclick="goToSuccessPage()">Payment Done</button>
    <!-- PAYMENT SUCCESS SCREEN -->
<div id="paymentSuccess" class="payment-success">
    <div class="success-circle">
        ✓
    </div>
    <h2>Payment Successful</h2>
    <p id="successName"></p>
    <p id="successUpi"></p>
</div>

</section>

<script src="payment.js"></script>
</body>
</html>
